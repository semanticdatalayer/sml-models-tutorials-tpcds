description: The tpcds catalog contains the TPC-DS model that is based on an industry-standard decision support benchmark that models a large retail business. It uses a rich star-schema–based data model with multiple fact tables and shared dimensions to represent sales, inventory, and customer activity across channels (store, catalog, and web), and is designed to evaluate the performance of complex analytical queries, reporting, and data warehousing systems.
