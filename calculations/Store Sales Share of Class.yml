unique_name: Store Sales Share of Class
object_type: metric_calc
label: Store Sales Share of Class
description: "Each item's Store Ext Sales Price as a percent (x100) of its own Product Class Name subtotal - share within its class / percent of class / an item's contribution to its class total. NULL when the class total is 0. Contrast Store Revenue Ratio by Product Class, which divides by the all-classes grand total, not the item's own class."
expression: "CASE WHEN ([Product Dimension].[Product Dimension].[All], [Product Dimension].[Product Class Name].CurrentMember, [Measures].[Store Ext Sales Price]) = 0 THEN NULL ELSE [Measures].[Store Ext Sales Price] * 100 / ([Product Dimension].[Product Dimension].[All], [Product Dimension].[Product Class Name].CurrentMember, [Measures].[Store Ext Sales Price]) END"
