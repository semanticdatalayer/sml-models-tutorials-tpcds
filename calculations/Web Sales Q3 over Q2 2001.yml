unique_name: Web Sales Q3 over Q2 2001
object_type: metric_calc
label: Web Sales Q3 over Q2 2001
description: "Ratio of web ext sales price in 2001 Q3 to 2001 Q2, per grouping (e.g. county); NULL when Q2 is zero. Q31 web_q2_q3_increase."
expression: |-
  IIF(([Measures].[Web Ext Sales Price], [Sold Date Dimensions].[Sold Date Dimensions].[Sold Calendar Quarter].&[2001-04-01]) = 0, NULL, ([Measures].[Web Ext Sales Price], [Sold Date Dimensions].[Sold Date Dimensions].[Sold Calendar Quarter].&[2001-07-01]) / ([Measures].[Web Ext Sales Price], [Sold Date Dimensions].[Sold Date Dimensions].[Sold Calendar Quarter].&[2001-04-01]))
