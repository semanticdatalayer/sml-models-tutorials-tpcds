unique_name: Store Returns 91 to 120 Days
object_type: metric_calc
label: Store Returns 91 to 120 Days
description: "Count of store returns made 91-120 days after the sale (>90 and <=120 days); 0 when none. Q50 aging bucket days_91_120."
expression: |-
  IIF(IsEmpty(([Measures].[Store Returns Count], [Returns Time Tier].[Returns Time Tier].[Returns Time Tier].&[91-120 days])), 0, ([Measures].[Store Returns Count], [Returns Time Tier].[Returns Time Tier].[Returns Time Tier].&[91-120 days]))
