unique_name: Store Returns 61 to 90 Days
object_type: metric_calc
label: Store Returns 61 to 90 Days
description: "Count of store returns made 61-90 days after the sale (>60 and <=90 days); 0 when none. Q50 aging bucket days_61_90."
expression: |-
  IIF(IsEmpty(([Measures].[Store Returns Count], [Returns Time Tier].[Returns Time Tier].[Returns Time Tier].&[61-90 days])), 0, ([Measures].[Store Returns Count], [Returns Time Tier].[Returns Time Tier].[Returns Time Tier].&[61-90 days]))
