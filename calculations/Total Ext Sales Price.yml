unique_name: Total Ext Sales Price
object_type: metric_calc
label: Total Extended Sales Price
description: >-
  Total extended sales price across all sales channels, including web, store,
  and catalog. Use this if you are looking for total sales.
expression: >-
  [Measures].[Store Ext Sales Price]+[Measures].[Web Ext Sales
  Price]+[Measures].[Catalog Ext Sales Price]
