unique_name: customer
object_type: dataset
label: customer
connection_id: Connection - TPCDS
sql: "SELECT c.*, ca.ca_zip AS current_zip, ca.ca_state AS current_state, ca.ca_gmt_offset AS current_gmt_offset FROM atscale_tutorial_data.tpcds.customer c LEFT JOIN atscale_tutorial_data.tpcds.customer_address ca ON c.c_current_addr_sk = ca.ca_address_sk"
dialects:
  - dialect: Snowflake
    sql: "SELECT c.*, ca.\"ca_zip\" AS \"current_zip\", ca.\"ca_state\" AS \"current_state\", ca.\"ca_gmt_offset\" AS \"current_gmt_offset\" FROM \"atscale_tutorial_data\".\"tpcds\".\"customer\" c LEFT JOIN \"atscale_tutorial_data\".\"tpcds\".\"customer_address\" ca ON c.\"c_current_addr_sk\" = ca.\"ca_address_sk\""
  - dialect: BigQuery
    sql: "SELECT c.*, ca.ca_zip AS current_zip, ca.ca_state AS current_state, ca.ca_gmt_offset AS current_gmt_offset FROM `atscale-tutorial-data`.tpcds.customer c LEFT JOIN `atscale-tutorial-data`.tpcds.customer_address ca ON c.c_current_addr_sk = ca.ca_address_sk"

columns:
  - name: current_zip
    data_type: string
  - name: current_state
    data_type: string
  - name: current_gmt_offset
    data_type: decimal(5,2)
  - name: c_birth_country
    data_type: string
  - name: c_birth_day
    data_type: int
  - name: c_birth_month
    data_type: int
  - name: c_birth_year
    data_type: int
  - name: c_current_addr_sk
    data_type: int
  - name: c_current_cdemo_sk
    data_type: int
  - name: c_current_hdemo_sk
    data_type: int
  - name: c_customer_id
    data_type: string
  - name: c_customer_sk
    data_type: int
  - name: c_email_address
    data_type: string
  - name: c_first_name
    data_type: string
  - name: c_first_sales_date_sk
    data_type: int
  - name: c_first_shipto_date_sk
    data_type: int
  - name: c_last_name
    data_type: string
  - name: c_last_review_date
    data_type: string
  - name: c_login
    data_type: string
  - name: c_preferred_cust_flag
    data_type: string
  - name: c_salutation
    data_type: string
  - name: Customer Preferred Flag
    data_type: boolean
    sql: CASE c_preferred_cust_flag WHEN 'T' THEN TRUE ELSE FALSE END
    dialects:
      - dialect: Snowflake
        sql: "CASE \"c_preferred_cust_flag\" WHEN 'T' THEN TRUE ELSE FALSE END"
