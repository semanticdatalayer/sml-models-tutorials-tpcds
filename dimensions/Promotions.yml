unique_name: Promotions
object_type: dimension
label: Promotions
hierarchies:
  - unique_name: Promotions
    label: Promotions
    filter_empty: 'yes'
    folder: Promotion Attributes
    levels:
      - unique_name: Promotions
        secondary_attributes:
          - unique_name: Channel Catalog
            label: Channel Catalog
            description: >-
              "Y" if this promotion was distributed via printed catalog, "N" if
              the promotion was not distributed via catalog.
            dataset: promotion
            folder: Promotion Attributes
            key_columns:
              - p_channel_catalog
            name_column: p_channel_catalog
            sort_column: p_channel_catalog
          - unique_name: Channel Direct Mail
            label: Channel Direct Mail
            description: >-
              "Y" if this promotion was sent by direct mail (postal mail,
              mailer), "N" if the promotion was not sent by direct mail.
            dataset: promotion
            folder: Promotion Attributes
            key_columns:
              - p_channel_dmail
            name_column: p_channel_dmail
            sort_column: p_channel_dmail
          - unique_name: Promoted Via DMail Email or TV
            label: Promoted Via DMail Email or TV
            description: >-
              "Y" if this promotion was distributed via direct mail, email, or
              TV (p_channel_dmail/email/tv = 'Y'), else "N". Single OR-combined
              flag so a promotion counts once across those three channels
              (no double-counting). Matches canonical TPC-DS Q61's channel filter.
            dataset: promotion
            folder: Promotion Attributes
            key_columns:
              - promo_dmail_email_tv
            name_column: promo_dmail_email_tv
            sort_column: promo_dmail_email_tv
          - unique_name: Channel Email
            label: Channel Email
            description: >-
              "Y" if this promotion was sent by email, "N" if the promotion was
              not sent by email.
            dataset: promotion
            folder: Promotion Attributes
            key_columns:
              - p_channel_email
            name_column: p_channel_email
            sort_column: p_channel_email
          - unique_name: Promotion Sent Via Email
            label: Promotion Sent Via Email
            description: >-
              "Y" if this promotion was sent by email, "N" if the promotion was
              not sent by email.
            allowed_calcs_for_dma:
              - Lag
              - Siblings
              - Range
            dataset: promotion
            folder: Promotion Attributes
            key_columns:
              - promotion_sent_via_email
            name_column: promotion_sent_via_email
            sort_column: promotion_sent_via_email
          - unique_name: Channel Event
            label: Channel Event
            description: >-
              "Y" if this promotion was delivered by an event, "N" if the
              promotion was not delivered by an event.
            dataset: promotion
            folder: Promotion Attributes
            key_columns:
              - p_channel_event
            name_column: p_channel_event
            sort_column: p_channel_event
          - unique_name: Channel Press
            label: Channel Press
            description: >-
              "Y" if this promotion was advertised in the press (newspaper,
              magazine, print), "N" if the promotion was not advertised in the
              press.
            dataset: promotion
            folder: Promotion Attributes
            key_columns:
              - p_channel_press
            name_column: p_channel_press
            sort_column: p_channel_press
          - unique_name: Channel Radio
            label: Channel Radio
            description: >-
              "Y" if this promotion was broadcast on radio, "N" if the
              promotion was not broadcast on radio.
            dataset: promotion
            folder: Promotion Attributes
            key_columns:
              - p_channel_radio
            name_column: p_channel_radio
            sort_column: p_channel_radio
          - unique_name: Channel TV
            label: Channel TV
            description: >-
              "Y" if this promotion was broadcast on television (TV), "N" if
              the promotion was not broadcast on television.
            dataset: promotion
            folder: Promotion Attributes
            key_columns:
              - p_channel_tv
            name_column: p_channel_tv
            sort_column: p_channel_tv
          - unique_name: Promotion Name
            description: "Display name of the promotion/campaign. Promotion, see channel flags for media used."
            label: Promotion Name
            dataset: promotion
            folder: Promotion Attributes
            key_columns:
              - p_promo_name
            name_column: p_promo_name
            sort_column: p_promo_name
          - unique_name: In Promotion
            label: In Promotion
            description: if this sale was part in a promotion
            allowed_calcs_for_dma:
              - Lag
              - Siblings
              - Range
            dataset: promotion
            folder: Promotion Attributes
            key_columns:
              - in_promotion
            name_column: in_promotion
            sort_column: in_promotion
level_attributes:
  - unique_name: Promotions
    description: "Promotion/campaign applied to a sale; one member per promotion. See Promotion Name; channel flags (email, TV, direct mail) are separate attributes."
    label: Promotion SK
    dataset: promotion
    key_columns:
      - p_promo_sk
    name_column: p_promo_sk
modeler_metadata:
  version: 0
  modified: 'false'
type: standard
