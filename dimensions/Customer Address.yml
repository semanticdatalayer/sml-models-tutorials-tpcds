unique_name: Customer Address
object_type: dimension
label: Customer Address
description: This is the dimension that describes where customers live.
hierarchies:
  - unique_name: Customer Address
    label: Customer Address
    filter_empty: 'yes'
    folder: Customer Information
    levels:
      - unique_name: Customer Country
      - unique_name: Customer State
        secondary_attributes:
          - unique_name: Customer State Name
            label: Customer State Name
            description: This is the customer's home state using the full state name.
            allowed_calcs_for_dma:
              - Lag
              - Siblings
              - Range
            dataset: customer_address
            folder: Customer Information
            key_columns:
              - Customer State Name
            name_column: Customer State Name
            sort_column: Customer State Name
      - unique_name: Customer City
      - unique_name: Customer Address
        secondary_attributes:
          - unique_name: Customer County
            label: Customer County
            description: This is the name of the customer's home county.
            dataset: customer_address
            folder: Customer Information
            key_columns:
              - ca_county
            name_column: ca_county
            sort_column: ca_county
          - unique_name: Customer GMT Offset
            label: Customer GMT Offset
            description: The GMT offset of the address, used to determine the time zone.
            dataset: customer_address
            folder: Customer Information
            key_columns:
              - ca_gmt_offset
            name_column: ca_gmt_offset
            sort_column: ca_gmt_offset
          - unique_name: Customer Zip Code
            label: Customer Zip Code
            description: This is the customer's zip code.
            dataset: customer_address
            folder: Customer Information
            key_columns:
              - ca_zip
            name_column: ca_zip
            sort_column: ca_zip
level_attributes:
  - unique_name: Customer Address
    label: Customer Address
    dataset: customer_address
    is_unique_key: true
    key_columns:
      - ca_address_sk
    name_column: ca_address_id
  - unique_name: Customer City
    label: Customer City
    description: >-
      This is the name of the customer's city the customer lives in, home city
      name
    dataset: customer_address
    key_columns:
      - ca_country
      - ca_state
      - ca_city
    name_column: ca_city
  - unique_name: Customer Country
    label: Customer Country
    description: The country the customer lives in, their home country
    dataset: customer_address
    key_columns:
      - ca_country
    name_column: ca_country
  - unique_name: Customer State
    label: Customer State Shorthand
    description: This is the customer's state using a two-digit abbreviation.
    dataset: customer_address
    key_columns:
      - ca_country
      - ca_state
    name_column: ca_state
