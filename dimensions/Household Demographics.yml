unique_name: Household Demographics
object_type: dimension
label: Household Demographics
hierarchies:
  - unique_name: Household Demographics
    label: Household Demographics
    filter_empty: 'yes'
    folder: Household Demographics
    levels:
      - unique_name: Household Demographics
        secondary_attributes:
          - unique_name: Customer Buy Potential
            description: "Household buying-potential band (purchasing power), e.g. '0-500', '501-1000', '>10000', 'Unknown'."
            label: Customer Buy Potential
            dataset: household_demographics
            folder: Household Demographics
            key_columns:
              - hd_buy_potential
            name_column: hd_buy_potential
            sort_column: hd_buy_potential
          - unique_name: Household Dependents Count
            description: "Number of dependents in the household. Household-level, not the customer-demographics dependent count."
            label: Household Dependents Count
            dataset: household_demographics
            folder: Household Demographics
            key_columns:
              - hd_dep_count
            name_column: hd_dep_count
            sort_column: hd_dep_count
          - unique_name: Vehicle Count
            description: "Number of vehicles owned by the household."
            label: Vehicle Count
            dataset: household_demographics
            folder: Household Demographics
            key_columns:
              - hd_vehicle_count
            name_column: hd_vehicle_count
            sort_column: hd_vehicle_count
level_attributes:
  - unique_name: Household Demographics
    description: "Household demographic profile (income band, buy potential, dependents, vehicles combination); one member per profile. Household-level, not Customer Demographics."
    label: Household Demographics
    dataset: household_demographics
    is_unique_key: true
    key_columns:
      - hd_demo_sk
    name_column: hd_demo_sk
relationships:
  - unique_name: Household Demographics Income Band
    from:
      dataset: household_demographics
      hierarchy: Household Demographics
      join_columns:
        - hd_income_band_sk
      level: Household Demographics
    to:
      dimension: Income Band
      level: Income Band
    type: embedded
type: standard
