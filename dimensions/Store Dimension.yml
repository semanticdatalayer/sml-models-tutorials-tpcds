unique_name: Store Dimension
object_type: dimension
label: Store Dimension
type: standard

hierarchies:

  - unique_name: Store Dimension
    label: Store Dimension
    folder: Store Attributes
    filter_empty: "yes"

    levels:

      - unique_name: Store Country

      - unique_name: Store State

        secondary_attributes:

          - unique_name: Store State Name
            label: Store State Name
            description: Full name of the State
            allowed_calcs_for_dma:
              - Lag
              - Siblings
              - Range
            dataset: store
            folder: Store Attributes
            key_columns:
              - Store State Name
            name_column: Store State Name
            sort_column: Store State Name

      - unique_name: Store County

      - unique_name: Store City

      - unique_name: Store Number

        secondary_attributes:

          - unique_name: Store Floor Space
            description: "Store floor space/size in square feet. Store size, not warehouse square footage."
            label: Store Floor Space
            folder: Store Attributes
            dataset: store
            name_column: s_floor_space
            key_columns:
              - s_floor_space
            sort_column: s_floor_space

          - unique_name: Store Hours
            label: Store Hours
            description: Store hours of operation
            folder: Store Attributes
            dataset: store
            name_column: s_hours
            key_columns:
              - s_hours
            sort_column: s_hours

          - unique_name: Store Manager
            label: Store Manager
            description: Name of the store manager
            folder: Store Attributes
            dataset: store
            name_column: s_manager
            key_columns:
              - s_manager
            sort_column: s_manager

          - unique_name: Store Number of Employees
            label: Store Number of Employees
            description: count of employees working at a store
            folder: Store Attributes
            dataset: store
            name_column: s_number_employees
            key_columns:
              - s_number_employees
            sort_column: s_number_employees

          - unique_name: Store Company ID
            description: "Numeric ID of the company that owns the store. Company, not Division or Market."
            label: Store Company ID
            folder: Store Attributes
            dataset: store
            name_column: s_company_id
            key_columns:
              - s_company_id
            sort_column: s_company_id

          - unique_name: Store GMT Offset
            description: "GMT/UTC timezone offset of the store location (e.g. -5, -6). Store, not the customer-address GMT offset."
            label: Store GMT Offset
            folder: Store Attributes
            dataset: store
            name_column: s_gmt_offset
            key_columns:
              - s_gmt_offset
            sort_column: s_gmt_offset

          - unique_name: Store Name
            description: "Store display name. Store, not Warehouse Name; see Store Number for the key."
            label: Store Name
            folder: Store Attributes
            dataset: store
            name_column: s_store_name
            key_columns:
              - s_store_name
            sort_column: s_store_name

          - unique_name: Store Street Name
            description: "Street name of the store's address. Store address, not customer or warehouse street."
            label: Store Street Name
            folder: Store Attributes
            dataset: store
            name_column: s_street_name
            key_columns:
              - s_street_name
            sort_column: s_street_name

          - unique_name: Store Street Number
            description: "Street number of the store's address. Store address component."
            label: Store Street Number
            folder: Store Attributes
            dataset: store
            name_column: s_street_number
            key_columns:
              - s_street_number
            sort_column: s_street_number

          - unique_name: Store Street Type
            description: "Street type/suffix of the store's address (e.g. Blvd, Ct, Ave, Ln)."
            label: Store Street Type
            folder: store attributes
            dataset: store
            name_column: s_street_type
            key_columns:
              - s_street_type
            sort_column: s_street_type

          - unique_name: Store Suite Number
            description: "Suite number of the store's address (e.g. Suite 100)."
            label: Store Suite Number
            folder: Store Attributes
            dataset: store
            name_column: s_suite_number
            key_columns:
              - s_suite_number
            sort_column: s_suite_number

          - unique_name: Store Zip Code
            description: "ZIP / postal code of the store's address. Store, not Customer zip."
            label: Store Zip Code
            folder: Store Attributes
            dataset: store
            name_column: s_zip
            key_columns:
              - s_zip
            sort_column: s_zip

level_attributes:

  - unique_name: Store City
    description: "City where the store is located. Store geography, not Customer City or Warehouse City."
    label: Store City
    dataset: store
    name_column: s_city
    key_columns:
      - s_country
      - s_state
      - s_city

  - unique_name: Store Country
    label: Store Country
    description: Store Country Name
    dataset: store
    name_column: s_country
    key_columns:
      - s_country

  - unique_name: Store County
    label: Store County
    description: Name of the Store's county
    dataset: store
    name_column: s_county
    key_columns:
      - s_state
      - s_county

  - unique_name: Store State
    label: Store State
    description: Store Shorthand, Abbreviation
    dataset: store
    name_column: s_state
    key_columns:
      - s_country
      - s_state

  - unique_name: Store Number
    label: Store Number
    description: ID of the store
    is_unique_key: true
    dataset: store
    name_column: s_store_sk
    key_columns:
      - s_store_sk