unique_name: Time Dimension
object_type: dimension
label: Time Dimension
type: time

hierarchies:

  - unique_name: Time Dimension
    label: Time Dimension
    filter_empty: "yes"
    folder: Time

    levels:

      - unique_name: Time SK

        secondary_attributes:

          - unique_name: Time AM or PM
            description: "AM/PM half-day indicator of the transaction time of day."
            label: Time AM or PM
            folder: Time
            dataset: time_dim
            key_columns:
              - t_am_pm
            name_column: t_am_pm
            sort_column: t_am_pm
            allowed_calcs_for_dma:
              - Lag
              - Range
              - Siblings

          - unique_name: Hour
            description: "Hour of day (0-23) of the transaction time. Time-of-day component, not a date part."
            label: Hour
            folder: Time
            dataset: time_dim
            key_columns:
              - t_hour
            name_column: t_hour
            sort_column: t_hour
            allowed_calcs_for_dma:
              - Lag
              - Range
              - Siblings

          - unique_name: Meal Time
            description: "Meal period of the time of day (breakfast, lunch, dinner; empty outside meal hours)."
            label: Meal Time
            folder: Time
            dataset: time_dim
            key_columns:
              - t_meal_time
            name_column: t_meal_time
            sort_column: t_meal_time
            allowed_calcs_for_dma:
              - Lag
              - Range
              - Siblings

          - unique_name: Minute
            description: "Minute (0-59) of the transaction time of day."
            label: Minute
            folder: Time
            dataset: time_dim
            key_columns:
              - t_minute
            name_column: t_minute
            sort_column: t_minute
            allowed_calcs_for_dma:
              - Lag
              - Range
              - Siblings

          - unique_name: Morning Time Tier
            description: "Half-hour morning time bucket, e.g. '08:30 to 09:00', '10:30 to 11:00'; groups times for morning-traffic analysis."
            label: Morning Time Tier
            folder: Time
            dataset: time_dim
            key_columns:
              - t_morning_time_tier
            name_column: t_morning_time_tier
            sort_column: t_morning_time_tier
            allowed_calcs_for_dma:
              - Lag
              - Range
              - Siblings

          - unique_name: Second
            description: "Second (0-59) of the transaction time of day."
            label: Second
            folder: Time
            dataset: time_dim
            key_columns:
              - t_second
            name_column: t_second
            sort_column: t_second
            allowed_calcs_for_dma:
              - Lag
              - Range
              - Siblings

          - unique_name: Time Sequence
            description: "Time of day as seconds since midnight (0-86399); numeric sort key. Contrast Hour/Minute/Second components."
            label: Time Sequence
            folder: Time
            dataset: time_dim
            key_columns:
              - t_time
            name_column: t_time
            sort_column: t_time
            allowed_calcs_for_dma:
              - Lag
              - Range
              - Siblings

level_attributes:

  - unique_name: Time SK
    description: "Time of day (one member per second of the day) by time ID; lowest time-of-day grain. Role-played as Sold/Return Time; not the Date dimension."
    label: Time SK
    dataset: time_dim
    key_columns:
      - t_time_sk
    name_column: t_time_id
    time_unit: second
