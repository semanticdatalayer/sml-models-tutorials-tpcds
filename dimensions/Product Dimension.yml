unique_name: Product Dimension
object_type: dimension
label: Product Dimension
description: >-
  This is the product dimension whose item is at the leaf level. Product
  Dimension (Items) roll up into product. category.
hierarchies:
  - unique_name: Product Dimension
    label: Product Dimension
    filter_empty: 'yes'
    folder: Product Attributes
    levels:
      - unique_name: Product Category
        secondary_attributes:
          - unique_name: Product Category ID
            label: Product Category ID
            description: Product category ID
            dataset: item
            folder: Product Attributes
            key_columns:
              - i_category_id
            name_column: i_category_id
            sort_column: i_category_id
      - unique_name: Product Class Name
        secondary_attributes:
          - unique_name: Product Class ID
            label: Product Class ID
            description: Product Class ID
            dataset: item
            folder: Product Attributes
            key_columns:
              - i_category
              - i_class_id
            name_column: i_class_id
            sort_column: i_class_id
      - unique_name: Product Dimension
        secondary_attributes:
          - unique_name: Product Color
            label: Product Color
            description: Product Color
            dataset: item
            folder: Product Attributes
            key_columns:
              - i_color
            name_column: i_color
            sort_column: i_color
          - unique_name: Product Size
            label: Product Size
            description: Product Size
            dataset: item
            folder: Product Attributes
            key_columns:
              - i_size
            name_column: i_size
            sort_column: i_size
          - unique_name: Product Brand ID
            label: Product Brand ID
            description: Product Brand ID
            dataset: item
            folder: Product Attributes
            key_columns:
              - i_brand_id
            name_column: i_brand_id
            sort_column: i_brand_id
          - unique_name: Product Brand Name
            label: Product Brand Name
            description: Product Brand Name
            dataset: item
            folder: Product Attributes
            key_columns:
              - i_brand_id
            name_column: i_brand
            sort_column: i_brand_id
          - unique_name: Product Current Price
            label: Product Current Price
            description: Product price
            dataset: item
            folder: Product Attributes
            key_columns:
              - i_current_price
            name_column: i_current_price
            sort_column: i_current_price
          - unique_name: Product Item ID
            label: Product Item ID
            description: Product (item) ID
            dataset: item
            folder: Product Attributes
            key_columns:
              - i_item_id
            name_column: i_item_id
            sort_column: i_item_id
          - unique_name: Product Manager ID
            label: Product Manager ID
            description: Product manager ID
            dataset: item
            folder: Product Attributes
            key_columns:
              - i_manager_id
            name_column: i_manager_id
            sort_column: i_manager_id
          - unique_name: Product Manufacturer ID
            label: Product Manufacturer ID
            description: Product manufacturer ID
            dataset: item
            folder: Product Attributes
            key_columns:
              - i_manufact_id
            name_column: i_manufact_id
            sort_column: i_manufact_id
          - unique_name: Product Manufacturer Name
            label: Product Manufacturer Name
            description: Product manufacturer name
            dataset: item
            folder: Product Attributes
            key_columns:
              - i_manufact_id
            name_column: i_manufact
            sort_column: i_manufact_id
          - unique_name: Product Item Name
            label: Product Item Name
            description: Product (item) name
            contains_unique_names: false
            dataset: item
            is_unique_key: false
            key_columns:
              - i_product_name
            name_column: i_product_name
level_attributes:
  - unique_name: Product Category
    label: Product category
    description: This is the product category.
    dataset: item
    key_columns:
      - i_category
    name_column: i_category
  - unique_name: Product Class Name
    label: Product Class Name
    description: >-
      Product class - the level between Product Category and the item. Keyed by
      (i_category, i_class) because class names repeat across categories (e.g.
      'kids' is both Home and Shoes), so the compound key keeps them distinct and
      lets Store Ext Sales Price roll up correctly to the class subtotal.
    dataset: item
    key_columns:
      - i_category
      - i_class
    name_column: i_class
  - unique_name: Product Dimension
    description: "Individual product/item identified by its description text; lowest level under Product Category. Item/SKU level."
    label: Product Item
    dataset: item
    is_unique_key: true
    key_columns:
      - i_item_sk
    name_column: i_item_desc
type: standard
