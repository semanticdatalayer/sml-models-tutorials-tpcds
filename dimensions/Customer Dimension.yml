unique_name: Customer Dimension
object_type: dimension
label: Customer Dimension
hierarchies:
  - unique_name: Customer Dimension
    label: Customer Dimension
    filter_empty: 'yes'
    folder: Customer Information
    levels:
      - unique_name: Customer Dimension
        secondary_attributes:
          - unique_name: Birth Country
            label: Birth Country
            description: Country of Origin
            dataset: customer
            folder: Customer Information
            key_columns:
              - c_birth_country
            name_column: c_birth_country
            sort_column: c_birth_country
          - unique_name: Preferred Customer Ind
            label: Preferred Customer Ind
            description: Marker for preferred customers
            dataset: customer
            folder: Customer Information
            key_columns:
              - c_preferred_cust_flag
            name_column: c_preferred_cust_flag
            sort_column: c_preferred_cust_flag
          - unique_name: Customer Email Address
            description: "Customer email address (contact email). Customer's own, not a store or web site contact."
            label: Customer Email Address
            dataset: customer
            folder: Customer Information
            key_columns:
              - c_email_address
            name_column: c_email_address
            sort_column: c_email_address
          - unique_name: Customer First Name
            description: "Customer first/given name. Pairs with Customer Last Name."
            label: Customer First Name
            dataset: customer
            folder: Customer Information
            key_columns:
              - c_first_name
            name_column: c_first_name
            sort_column: c_first_name
          - unique_name: Customer ID
            description: "Customer business identifier (stable natural key string). Identifier attribute, not the surrogate-key level itself."
            label: Customer ID
            dataset: customer
            folder: Customer Information
            key_columns:
              - c_customer_id
            name_column: c_customer_id
            sort_column: c_customer_id
          - unique_name: Customer Last Name
            description: "Customer last/family name (surname). Pairs with Customer First Name."
            label: Customer Last Name
            dataset: customer
            folder: Customer Information
            key_columns:
              - c_last_name
            name_column: c_last_name
            sort_column: c_last_name
          - unique_name: Customer Login
            description: "Customer web login/username for their online account. Not the email address."
            label: Customer Login
            dataset: customer
            folder: Customer Information
            key_columns:
              - c_login
            name_column: c_login
            sort_column: c_login
          - unique_name: Customer Preferred Flag
            label: Customer Preferred Flag
            description: flag to determine if this is a preferred customer
            contains_unique_names: false
            dataset: customer
            is_unique_key: false
            key_columns:
              - Customer Preferred Flag
            name_column: Customer Preferred Flag
level_attributes:
  - unique_name: Customer Dimension
    description: "Individual customer (person/shopper); one member per customer. See Customer ID for the business identifier and First/Last Name attributes."
    label: Customer Number
    dataset: customer
    is_unique_key: true
    key_columns:
      - c_customer_sk
    name_column: c_customer_sk
relationships:
  - unique_name: Customer Dimension Customer Address
    from:
      dataset: customer
      hierarchy: Customer Dimension
      join_columns:
        - c_current_addr_sk
      level: Customer Dimension
    role_play: Current {0}
    to:
      dimension: Customer Address
      level: Customer Address
    type: embedded
type: standard
